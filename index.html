  <script>
    (function() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      const COLORS = ['#f2c94c', '#bb86fc', '#03dac6', '#56aef0', '#ffb547'];
      const COUNT = 40;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      for (let i = 0; i < COUNT; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.5 + 0.5,
          dx: (Math.random() - 0.5) * 0.15,
          dy: (Math.random() - 0.5) * 0.1,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          alpha: Math.random() * 0.4 + 0.1,
        });
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const p of particles) {
          p.x += p.dx; p.y += p.dy;
          if (p.x < 0) p.x = canvas.width;
          if (p.x > canvas.width) p.x = 0;
          if (p.y < 0) p.y = canvas.height;
          if (p.y > canvas.height) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.alpha;
          ctx.fill();
        }
        // Draw faint connections between nearby particles
        ctx.globalAlpha = 0.06;
        ctx.strokeStyle = '#f2c94c';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>

                        <div style={{ fontSize: 11, color: P.textBright, flex: 1 }}>{oq.q}</div>
                        <span style={{ color: P.textDim, fontSize: 10, transform: expandedQ === i ? "rotate(90deg)" : "rotate(0)", transition: "transform 0.15s" }}>▸</span>
                      </div>
                      {expandedQ === i && (
                        <div style={{ marginTop: 6, paddingLeft: 52, fontSize: 10, color: P.textDim, lineHeight: 1.6, animation: "fadeIn 0.2s ease-out" }}>
                          <span style={{ color: oq.color }}>Approach: </span>{oq.approach}
                        </div>
                      )}
                    </div>
                  ))}
                </Card>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10 }}>
                  {[
                    { val: "25", label: "Tests Passed", accent: P.green },
                    { val: "5D", label: "Φ-Vector", accent: P.purple },
                    { val: "C_cont", label: "Core Metric", accent: P.gold },
                    { val: "3", label: "Research Phases", accent: P.teal },
                  ].map(({ val, label, accent }) => (
                    <div key={label} className="stat-card" style={{
                      textAlign: "center", padding: 14,
                      background: `${accent}08`, border: `1px solid ${accent}25`, borderRadius: 6
                    }}>
                      <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 22, color: accent, fontWeight: 700 }}>{val}</div>
                      <div style={{ fontSize: 8, color: P.textDim, letterSpacing: "0.15em", marginTop: 4 }}>{label}</div>
                    </div>
                  ))}
                </div>

                <Card title="The Central Thesis" accent={P.gold} style={{ marginTop: 12 }}>
                  <div className="equation-block">
                    <div style={{ fontSize: 9, color: P.gold, letterSpacing: "0.25em", marginBottom: 10, fontFamily: "'IBM Plex Mono', monospace" }}>
                      COMPLEXITY RESTORATION IS SUBSTRATE TRANSITION ENGINEERING
                    </div>
                    <p style={{
                      fontFamily: "'Cormorant Garamond', serif",
                      fontSize: 15, lineHeight: 1.8, color: P.text, margin: 0, fontStyle: "italic"
                    }}>
                      Every therapeutic intervention — cancer treatment, anti-aging, post-mortem substrate transition —
                      is an attempt to extend the area under the Φ(t) curve above the HB₀ line.
                      The organism's sentience is sustained when, and only when, the Consciousness Continuity Integral
                      remains positive.
                    </p>
                  </div>
                </Card>
              </div>
            )}

          </div>

          {/* Footer */}
          <div style={{
            borderTop: `1px solid ${P.gold}10`, padding: "14px 28px",
            display: "flex", justifyContent: "space-between", alignItems: "center",
            maxWidth: 940, margin: "24px auto 0",
          }}>
            <div style={{ fontSize: 8, color: P.textDim, letterSpacing: "0.15em" }}>
              PROJECT CONFLUENCE · cloudynirvana · 2026
            </div>
            <div style={{ fontSize: 8, color: P.textDim, letterSpacing: "0.15em" }}>
              IIT · BORJIGIN · KOCH · FRONTIERS · ARC INSTITUTE
            </div>
          </div>

          <div style={{ height: 40 }} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
